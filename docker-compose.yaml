services:
  mycoffee:
    image: 'httpd'
    ports:
      - '80-85:80'
    volumes:
      - './indexes/mycoffee:/usr/local/apache2/htdocs'
    networks:
      - 'abhi'

  myecom:
    image: 'httpd'
    ports:
      - '90-95:80'
    volumes:
      - './indexes/ecom:/usr/local/apache2/htdocs'
    networks:
      - 'abhi'

  myclass:
    image: 'httpd'
    ports:
      - '70-75:80'
    volumes:
      - './indexes/class:/usr/local/apache2/htdocs'
    networks:
      - 'abhi'

  mytomcat:
    image: 'tomcat:10'
    ports:
      - '8080:8080'
    volumes:
      - './indexes/wars:/usr/local/tomcat/webapps/'
    networks:
      - 'abhi'  

networks:
  abhi:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
          gateway: 10.10.0.1


